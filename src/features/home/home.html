@if (!allowAccess()) {
<div class="flex-1 gap-3 mt-5">
    <div class="flex justify-center items-center">
        <div class="flex flex-col gap-3 2xl:basis-1/3 xl:basis-1/3 lg:basis-1/3 md:basis-2/3 sm:basis-2/3 basis-2/3">
            <form #loginForm="ngForm" class="flex flex-col gap-5 mt-5" (ngSubmit)="login()">
                <input [(ngModel)]="password" name="password" type="password" class="input w-full" required
                    placeholder="Password">
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>
</div>
} @else {
<div class="card card-title m-5">
    <div class="p-5 mt-5 rounded-lg cursor-pointer 
        2xl:min-w-lg xl:min-w-lg lg:min-w-lg md:min-w-lg min-w-sm
        hover:transition-all hover:duration-200 hover:scale-102">
        <h3 class="text-primary text-center">
            <a href="assets/20260214/index.html" class="justify-center monoton-regular">
                2026 Valentine's Day
            </a>
        </h3>
    </div>
</div>
}
